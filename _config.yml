# Site settings
title: Awesome OpenClaw Tutorial
description: 龙虾 OpenClaw 教程，从零开始玩转大龙虾 Claw：安装配置、飞书接入、Skills 扩展与实战案例，最全面的中文 OpenClaw 指南。
baseurl: ""
url: ""  # 必填：用于 SEO、sitemap、canonical。例如 https://你的用户名.github.io/你的仓库名
repository: ""

# SEO（jekyll-seo-tag 与搜索引擎优化）
# 热门关键词：龙虾、大龙虾、claw、openclaw，已融入 description 与 keywords
keywords: "龙虾, 大龙虾, claw, openclaw, OpenClaw, OpenClaw教程, 龙虾教程, AI助手, 飞书机器人, Skills"
locale: zh_CN
lang: zh-CN
# 站点头图（用于社交分享，建议 1200x630）。留空则使用无图模式
# image: "/assets/og-image.png"
twitter:
  username: ""  # 可选，如 your_handle（不需要 @）
  card: summary_large_image
# 可选：Open Graph 默认图
# og_image: "/assets/og-image.png"

# Theme
theme: jekyll-theme-cayman
remote_theme: pages-themes/cayman@v0.2.0

# Plugins
plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-titles-from-headings
  - jekyll-seo-tag
  - jekyll-sitemap  # 生成 sitemap.xml，便于搜索引擎抓取

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Navigation
navigation:
  - title: 首页
    url: /
  - title: 快速开始
    url: /docs/01-basics/03-quick-start
  - title: 核心功能
    url: /docs/02-core-features/04-file-management
  - title: 进阶应用
    url: /docs/03-advanced/08-skills-extension
  - title: 实战案例
    url: /docs/04-practical-cases/12-personal-productivity
  - title: 附录
    url: /appendix/A-command-reference

# Relative links
relative_links:
  enabled: true
  collections: true

# Optional front matter
optional_front_matter:
  remove_originals: true

# Titles from headings
titles_from_headings:
  enabled: true
  strip_title: true
  collections: true

# Include
include:
  - _config.yml
  - README.md
  - index.md
  - docs
  - appendix

# Exclude from processing
exclude:
  - .git
  - .gitignore
  - .claude
  - .vscode
  - .github
  - backups
  - scripts
  - Gemfile
  - Gemfile.lock
  - node_modules
